# @package _global_
# Visual diffusion policy for robosuite bin-placing.
# past_action_visible=false: image history provides sufficient context.

seed: 100000
dataset_repo_id: robosuite
condition_type: unconditional
dataset_root: data/robosuite/demos/demo_can_10prism_10starts.hdf5   # path to .hdf5 demo file
past_action_visible: false

wandb:
  enable: true
  project: "robosuite-base-models"

hydra:
  run:
    dir: data/robosuite_dp/train/${now:%Y.%m.%d}/${hydra.job.name}
  job:
    name: ${now:%H.%M.%S}_${env.name}_${policy.name}_visual

device: cuda:1
use_amp: True

training:
  offline_steps: 400000
  online_steps: 0
  eval_freq: 20000
  save_freq: 20000
  log_freq: 500
  save_checkpoint: true
  batch_size: 64
  num_workers: 4
  grad_clip_norm: 10
  lr: 1.0e-4
  lr_scheduler: cosine
  lr_warmup_steps: 500
  adam_betas: [0.95, 0.999]
  adam_eps: 1.0e-8
  adam_weight_decay: 1.0e-6
  online_steps_between_rollouts: 1
  drop_n_last_frames: 17  # horizon(64) - n_action_steps(32) - n_obs_steps(16) + 1

  delta_timestamps:
    observation.state: "[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1)]"
    observation.image.agentview: "[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1)]"
    action: "[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1 - ${policy.n_obs_steps} + ${policy.horizon})]"

eval:
  n_episodes: 50
  obs_file: data/robosuite/obs/obs_can_10prism_10starts.npz   # path to observations .npz
  train_prisms: [0, 1, 2, 3, 4, 5, 6]
  test_prisms: [7, 8, 9]
  train_bins: null
  test_bins: null
  steps_per_action: 2
  max_episode_steps: 400
  img_size: 84
  object: can
  action_chunk_sizes: [16, 32]
  metrics: []  # e.g. [x_alignment, y_alignment, z_table_dist, goal_progress]
  methods: ['ddim']
  opt_params: null

policy:
  name: diffusion

  n_obs_steps: 16
  horizon: 64
  n_action_steps: 32

  input_shapes:
    observation.state: [8]
    observation.image.agentview: [3, 84, 84]
  output_shapes:
    action: [8]

  input_normalization_modes:
    observation.state: min_max
    observation.image.agentview: min_max
  output_normalization_modes:
    action: min_max

  use_stats_mapping: false

  # Vision backbone
  vision_backbone: resnet18
  crop_shape: [84, 84]
  crop_is_random: True
  pretrained_backbone_weights: null
  use_group_norm: True
  spatial_softmax_num_keypoints: 32

  # UNet
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  diffusion_step_embed_dim: 128
  use_film_scale_modulation: True

  # Noise scheduler
  noise_scheduler_type: DDIM
  num_train_timesteps: 100
  beta_schedule: squaredcos_cap_v2
  beta_start: 0.0001
  beta_end: 0.02
  prediction_type: epsilon
  clip_sample: True
  clip_sample_range: 1.0
  num_inference_steps: 10

  do_mask_loss_for_padding: True
  gradient_loss_weight: 1
  supervise_energy_landscape: False
  energy_landscape_loss_weight: 0.0
  finetune_energy_landscape: false
  finetune_loss_weight: 0
