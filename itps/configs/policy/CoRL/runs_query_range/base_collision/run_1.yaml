# @package _global_
seed: 100000
dataset_repo_id: maze2d
condition_type: conditional
env_type: sparse
dataset_root:
  base: data/maze2d-sparse-v3.hdf5
  pos: data/maze_comparisons/maze_20260713_115431_shuffled_winners.npz
  neg: data/maze_comparisons/maze_20260713_115431_shuffled_losers.npz
pretrained_policy_path: data/maze2d_dp/sparse/gc/train/2026.05.13/02.28.05_maze2d_diffusion/checkpoints/last/pretrained_model
wandb:
  enable: true
  project: maze2d-finetune-sparse-collision-final
hydra:
  run:
    dir: data/maze2d_dp/sparse/gc/tune/${now:%Y.%m.%d}/${hydra.job.name}
  job:
    name: base_tune_collision_IRED_${now:%H.%M.%S}_${env.name}_${policy.name}_nq${training.n_queries}
device: cuda:1
training:
  offline_steps: 10000
  online_steps: 0
  eval_freq: 500
  save_freq: 500
  log_freq: 500
  save_checkpoint: true
  batch_size: 256
  grad_clip_norm: 10
  lr: 1.0e-05
  lr_scheduler: cosine
  lr_warmup_steps: 500
  adam_betas:
  - 0.95
  - 0.999
  adam_eps: 1.0e-08
  adam_weight_decay: 1.0e-06
  online_steps_between_rollouts: 1
  delta_timestamps:
    observation.environment_state: '[i / ${fps} for i in range(1 - ${policy.n_obs_steps},
      1)]'
    observation.state: '[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1)]'
    action: '[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1 - ${policy.n_obs_steps}
      + ${policy.horizon})]'
    episode_goal: '[0]'
  goal_horizon: 64
  drop_n_last_frames: 7
  n_queries: 100
eval:
  n_samples: 32
  opt_params:
  - n_opt: 1
    t_subset: 5
    denoise: true
  metrics:
  - collision_rate
  - obs_goal_dist
  methods:
  - ired
  train_obs: data/maze_obs/set_obs_gc_40_min5_max7_seed0_20260430_031349_train
  test_obs: data/maze_obs/set_obs_gc_40_min5_max7_seed0_20260430_031349_test
policy:
  name: diffusion
  n_obs_steps: 2
  horizon: 64
  n_action_steps: 8
  input_shapes:
    observation.environment_state:
    - 2
    observation.state:
    - ${env.state_dim}
    episode_goal:
    - 2
  output_shapes:
    action:
    - ${env.action_dim}
  input_normalization_modes:
    observation.environment_state: min_max
    observation.state: min_max
    episode_goal: min_max
  output_normalization_modes:
    action: min_max
  vision_backbone: resnet18
  crop_shape:
  - 84
  - 84
  crop_is_random: true
  pretrained_backbone_weights: null
  use_group_norm: true
  spatial_softmax_num_keypoints: 32
  down_dims:
  - 128
  - 256
  - 512
  kernel_size: 5
  n_groups: 8
  diffusion_step_embed_dim: 128
  use_film_scale_modulation: true
  noise_scheduler_type: DDIM
  num_train_timesteps: 100
  beta_schedule: squaredcos_cap_v2
  beta_start: 0.0001
  beta_end: 0.02
  prediction_type: epsilon
  clip_sample: true
  clip_sample_range: 1.0
  num_inference_steps: 10
  do_mask_loss_for_padding: true
  gradient_loss_weight: 1.0
  supervise_energy_landscape: false
  energy_landscape_loss_weight: 0.0
  finetune_energy_landscape: true
  finetune_loss_weight: 5.0
