# @package _global_
sweep: 
  training:
    offline_steps: [2000, 5000, 10000, 20000]
    lr: [1.0e-3, 1.0e-4]
    batch_size: [256, 128]
    train_only_FiLM: [true, false]
  policy:
    dpo_params:
      rho: 500
      mu: [1.25, 1.5]
      b: 0

seed: 100000
dataset_repo_id: maze2d
condition_type: unconditional
env_type: large
dataset_root:
  base: 'data/maze2d-large-sparse-v1.hdf5'
  pos: data/maze_comparisons/landscape_100_seed_0_maze_20260429_233131_winners.npz
  neg: data/maze_comparisons/landscape_100_seed_0_maze_20260429_233131_losers.npz
pretrained_policy_path: data/maze2d_dp/large/general/train/pretrained_maze_100

wandb:
  enable: true
  project: "maze2d-dpo-finetuning-pt"

config_name: ???  # Will be set at runtime by run_job.py

hydra:
  run:
    # Set `dir` to where you would like to save all of the run outputs. If you run another training session
    # with the same value for `dir` its contents will be overwritten unless you set `resume` to true.
    dir: data/maze2d_dp/large/general/tune/DPO_param_sweep_2/${now:%Y.%m.%d}/${hydra.job.name}
  job:
    name: maze_general_tune_DPO_param_sweep_2_${now:%H.%M.%S}_${env.name}_${config_name}_${policy.name}

device: "cuda"  # cpu

training:
  # train_only_FiLM: False
  # offline_steps: 50000
  online_steps: 0
  eval_freq: 1000
  save_freq: 1000
  log_freq: 500
  save_checkpoint: false

  #batch_size: 256
  grad_clip_norm: 10
  #lr: 1.0e-4
  lr_scheduler: cosine
  lr_warmup_steps: 500
  adam_betas: [0.95, 0.999]
  adam_eps: 1.0e-8
  adam_weight_decay: 1.0e-6
  online_steps_between_rollouts: 1

  delta_timestamps:
    observation.environment_state: "[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1)]"
    observation.state: "[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1)]"
    action: "[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1 - ${policy.n_obs_steps} + ${policy.horizon})]"

  # The original implementation doesn't sample frames for the last 7 steps,
  # which avoids excessive padding and leads to improved training results.
  drop_n_last_frames: 7  # ${policy.horizon} - ${policy.n_action_steps} - ${policy.n_obs_steps} + 1

eval:
  n_samples: 32     # trajectory samples per starting observation
  opt_params: [{'n_opt': 1, 't_subset': null, 'denoise': False},  {'n_opt': 1, 't_subset': 5, 'denoise': True}]
  goal: [0.98, 9.95]
  metrics: [collision_rate, finetune_goal_dist]
  methods: ['ired', 'ddim']
  train_obs: data/maze_obs/set_obs_40_seed0_20260427_231422_train
  test_obs: data/maze_obs/set_obs_40_seed0_20260427_231422_test

policy:
  name: diffusion

  # Input / output structure.
  n_obs_steps: 2
  horizon: 64
  n_action_steps: 8

  input_shapes:
    # TODO(rcadene, alexander-soare): add variables for height and width from the dataset/env?
    observation.environment_state: [2]
    observation.state: ["${env.state_dim}"]
  output_shapes:
    action: ["${env.action_dim}"]

  # Normalization / Unnormalization
  input_normalization_modes:
    observation.environment_state: min_max
    observation.state: min_max
  output_normalization_modes:
    action: min_max

  # Architecture / modeling.
  # Vision backbone.
  vision_backbone: resnet18
  crop_shape: [84, 84]
  crop_is_random: True
  pretrained_backbone_weights: null
  use_group_norm: True
  spatial_softmax_num_keypoints: 32
  # Unet.
  down_dims: [128, 256, 512]
  kernel_size: 5
  n_groups: 8
  diffusion_step_embed_dim: 128
  use_film_scale_modulation: True
  # Noise scheduler.
  noise_scheduler_type: DDIM
  num_train_timesteps: 100
  beta_schedule: squaredcos_cap_v2
  beta_start: 0.0001
  beta_end: 0.02
  prediction_type: epsilon # epsilon / sample
  clip_sample: True
  clip_sample_range: 1.0

  # Inference
  num_inference_steps: 10  # if not provided, defaults to `num_train_timesteps`

  # Loss computation
  do_mask_loss_for_padding: True

  gradient_loss_weight: 0.0 #unused with DPO

  supervise_energy_landscape: false
  energy_landscape_loss_weight: 0.0

  finetune_energy_landscape: false
  finetune_loss_weight: 0.0

  finetune_demos: false
  demo_finetune_loss_weight: 0.0

  finetune_dpo: true
  # dpo_params: 
  #   rho: 500
  #   mu: 0.2
  #   b: 0