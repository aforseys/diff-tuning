# @package _global_
seed: 100000
dataset_repo_id: maze2d
condition_type: unconditional
env_type: large
dataset_root:
  base: data/maze2d-large-sparse-v1.hdf5
  pos: data/maze_comparisons/landscape_100_seed_0_maze_20260429_233131_winners.npz
  neg: data/maze_comparisons/landscape_100_seed_0_maze_20260429_233131_losers.npz
pretrained_policy_path: data/maze2d_dp/large/general/train/pretrained_maze_100
wandb:
  enable: true
hydra:
  run:
    dir: data/maze2d_dp/large/general/tune/param_sweep_1/${now:%Y.%m.%d}/${hydra.job.name}
  job:
    name: maze_general_tune_param_sweep_1_${now:%H.%M.%S}_${env.name}_${policy.name}
device: cuda
training:
  online_steps: 0
  eval_freq: 1000
  save_freq: 1000
  log_freq: 500
  save_checkpoint: false
  grad_clip_norm: 10
  lr_scheduler: cosine
  lr_warmup_steps: 500
  adam_betas:
  - 0.95
  - 0.999
  adam_eps: 1.0e-08
  adam_weight_decay: 1.0e-06
  online_steps_between_rollouts: 1
  delta_timestamps:
    observation.environment_state: '[i / ${fps} for i in range(1 - ${policy.n_obs_steps},
      1)]'
    observation.state: '[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1)]'
    action: '[i / ${fps} for i in range(1 - ${policy.n_obs_steps}, 1 - ${policy.n_obs_steps}
      + ${policy.horizon})]'
  drop_n_last_frames: 7
  offline_steps: 5000
  lr: 0.0001
  batch_size: 64
eval:
  n_samples: 32
  opt_params:
  - n_opt: 1
    t_subset: null
    denoise: false
  - n_opt: 2
    t_subset: null
    denoise: false
  - n_opt: 1
    t_subset: 5
    denoise: false
  - n_opt: 1
    t_subset: 5
    denoise: true
  - n_opt: 2
    t_subset: 5
    denoise: true
  goal:
  - 0.98
  - 9.95
  metrics:
  - collision_rate
  - finetune_goal_dist
  methods:
  - ired
  - ddim
  train_obs: data/maze_obs/set_obs_40_seed0_20260427_231422_train
  test_obs: data/maze_obs/set_obs_40_seed0_20260427_231422_test
policy:
  name: diffusion
  n_obs_steps: 2
  horizon: 64
  n_action_steps: 8
  input_shapes:
    observation.environment_state:
    - 2
    observation.state:
    - ${env.state_dim}
  output_shapes:
    action:
    - ${env.action_dim}
  input_normalization_modes:
    observation.environment_state: min_max
    observation.state: min_max
  output_normalization_modes:
    action: min_max
  vision_backbone: resnet18
  crop_shape:
  - 84
  - 84
  crop_is_random: true
  pretrained_backbone_weights: null
  use_group_norm: true
  spatial_softmax_num_keypoints: 32
  down_dims:
  - 128
  - 256
  - 512
  kernel_size: 5
  n_groups: 8
  diffusion_step_embed_dim: 128
  use_film_scale_modulation: true
  noise_scheduler_type: DDIM
  num_train_timesteps: 100
  beta_schedule: squaredcos_cap_v2
  beta_start: 0.0001
  beta_end: 0.02
  prediction_type: epsilon
  clip_sample: true
  clip_sample_range: 1.0
  num_inference_steps: 10
  do_mask_loss_for_padding: true
  gradient_loss_weight: 1.0
  supervise_energy_landscape: false
  energy_landscape_loss_weight: 0.0
  finetune_energy_landscape: true
  finetune_loss_weight: 5.0
