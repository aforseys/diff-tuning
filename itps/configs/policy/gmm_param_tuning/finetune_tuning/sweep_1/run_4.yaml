# @package _global_
seed: 1
dataset_repo_id: gmm
condition_type: unconditional
dataset_root:
  base: data/gmm_unconditional_1000_42_20251204_174604.npy
  pos: data/gmm_unconditional_pref_cluster_0_positive_dataset_20251204_192929.npy
  neg: data/gmm_unconditional_pref_cluster_0_negative_dataset_20251204_192929.npy
pretrained_policy_path: outputs/gmm/unconditioned/train/run_unconditional_2025-12-04_18-29-47/
wandb:
  enable: true
hydra:
  run:
    dir: outputs/gmm/unconditioned/tune/param_sweep_1/${hydra.job.name}
  job:
    name: gmm_unconditional_tune_param_sweep_1_${now:%Y.%m.%d.%H.%M.%S}_${env.name}_${policy.name}
device: cuda
training:
  online_steps: 0
  eval_freq: 100
  save_freq: 100
  log_freq: 100
  save_checkpoint: false
  grad_clip_norm: 10
  lr_scheduler: cosine
  lr_warmup_steps: 50
  adam_betas:
  - 0.95
  - 0.999
  adam_eps: 1.0e-08
  adam_weight_decay: 1.0e-06
  online_steps_between_rollouts: 1
  delta_timestamps:
    observation.environment_state: '[0]'
    observation.state: '[0]'
    action: '[0]'
  drop_n_last_frames: false
  offline_steps: 300
  lr: 0.001
  batch_size: 128
eval:
  n_samples: 200
policy:
  name: diffusion
  n_obs_steps: 1
  horizon: 1
  n_action_steps: 1
  input_shapes:
    observation.environment_state:
    - 1
    observation.state:
    - ${env.state_dim}
  output_shapes:
    action:
    - ${env.action_dim}
  input_normalization_modes:
    observation.environment_state: min_max
    observation.state: min_max
  output_normalization_modes:
    action: min_max
  vision_backbone: resnet18
  crop_shape:
  - 84
  - 84
  crop_is_random: true
  pretrained_backbone_weights: null
  use_group_norm: true
  spatial_softmax_num_keypoints: 32
  down_dims:
  - 128
  - 256
  - 512
  kernel_size: 5
  n_groups: 8
  diffusion_step_embed_dim: 128
  use_film_scale_modulation: true
  noise_scheduler_type: DDIM
  num_train_timesteps: 100
  beta_schedule: squaredcos_cap_v2
  beta_start: 0.0001
  beta_end: 0.02
  prediction_type: epsilon
  clip_sample: true
  clip_sample_range: 1.0
  num_inference_steps: 10
  do_mask_loss_for_padding: false
  gradient_loss_weight: 1.0
  supervise_energy_landscape: false
  energy_landscape_loss_weight: 0.0
  finetune_energy_landscape: true
  finetune_loss_weight: 2.0
